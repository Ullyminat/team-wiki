version: '3.8'

services:
  # ==========================================
  # 1. Основное Приложение (Next.js)
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wiki_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://wiki_user:wiki_password@db:5432/team_wiki?schema=public
      - NEXTAUTH_SECRET=G9i8t2pX7nQ3mE1vB5zC8wK9sF2jL5hA
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - wiki_network

  # ==========================================
  # 2. База Данных (PostgreSQL)
  # ==========================================
  db:
    image: postgres:15-alpine
    container_name: wiki_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wiki_user
      POSTGRES_PASSWORD: wiki_password
      POSTGRES_DB: team_wiki
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki_user -d team_wiki"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wiki_network

  # ==========================================
  # 3. Удобная веб-панель для просмотра базы данных
  # ==========================================
  adminer:
    image: adminer
    container_name: wiki_db_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db
    networks:
      - wiki_network

  # ==========================================
  # 4. MinIO (S3-совместимое хранилище файлов)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: wiki_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - wiki_network

networks:
  wiki_network:
    driver: bridge

volumes:
  pg_data:
  minio_data:
